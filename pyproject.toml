[tool.ruff]
target-version = "py38"
line-length = 100
src = ["src"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.isort]
combine-as-imports = true
force-sort-within-sections = true

[tool.pytest.ini_options]
testpaths = ["src/tests"]
pythonpath = ["src"]
markers = [
  "integration: 需要外部依赖的集成测试",
]

[tool.mypy]
# Pxx：引入 mypy 后补齐
