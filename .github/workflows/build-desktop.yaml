name: Build Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 0.2.0)"
        required: false
        type: string
      release_label:
        description: "Release label (e.g. Early Access, Beta)"
        required: false
        type: string
        default: "Early Access"

permissions:
  contents: write
  packages: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 – Cross-compile Go sidecar for every target platform/arch
  # ---------------------------------------------------------------------------
  build-sidecar:
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cgo_enabled: 1
            goos: darwin
            goarch: arm64
            electron_platform: darwin
            electron_arch: arm64
          - os: macos-15-intel
            cgo_enabled: 1
            goos: darwin
            goarch: amd64
            electron_platform: darwin
            electron_arch: x64
          - os: ubuntu-latest
            cgo_enabled: 0
            goos: linux
            goarch: amd64
            electron_platform: linux
            electron_arch: x64
          - os: ubuntu-latest
            cgo_enabled: 0
            goos: linux
            goarch: arm64
            electron_platform: linux
            electron_arch: arm64
          - os: windows-latest
            cgo_enabled: 0
            goos: windows
            goarch: amd64
            electron_platform: win32
            electron_arch: x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Build sidecar
        run: |
          BIN_NAME="desktop-${{ matrix.electron_platform }}-${{ matrix.electron_arch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi
          mkdir -p dist
          CGO_ENABLED=${{ matrix.cgo_enabled }} GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -tags desktop -trimpath -ldflags '-s -w' \
            -o "dist/${BIN_NAME}" \
            ./src/services/desktop/cmd/desktop
          echo "Built dist/${BIN_NAME}"
          ls -lh dist/

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2 – Build Electron installers per platform
  # ---------------------------------------------------------------------------
  build-desktop:
    defaults:
      run:
        shell: bash
    needs: build-sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            electron_arch: arm64
            sidecar_artifact: sidecar-darwin-arm64
            builder_args: --mac --arm64
          - os: macos-15-intel
            platform: darwin
            electron_arch: x64
            sidecar_artifact: sidecar-darwin-amd64
            builder_args: --mac --x64
          - os: ubuntu-latest
            platform: linux
            electron_arch: x64
            sidecar_artifact: sidecar-linux-amd64
            builder_args: --linux --x64
          - os: windows-latest
            platform: win32
            electron_arch: x64
            sidecar_artifact: sidecar-windows-amd64
            builder_args: --win --x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(node -p "require('./src/apps/desktop/package.json').version")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "label=${{ inputs.release_label || 'Early Access' }}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download sidecar binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.sidecar_artifact }}
          path: src/apps/desktop/sidecar-bin/

      - name: Make sidecar executable
        if: runner.os != 'Windows'
        run: chmod +x src/apps/desktop/sidecar-bin/*

      - name: Build web app
        run: pnpm --filter @arkloop/desktop build:web

      - name: Generate release meta
        run: |
          mkdir -p src/apps/desktop/dist
          echo '{"releaseLabel":"${{ steps.release_meta.outputs.label }}"}' > src/apps/desktop/dist/release-meta.json

      - name: Build Electron TypeScript
        run: pnpm --filter @arkloop/desktop build:electron

      - name: Run electron-builder (macOS)
        if: matrix.platform == 'darwin'
        working-directory: src/apps/desktop
        run: |
          if [ -n "${{ secrets.MAC_CSC_LINK }}" ]; then export CSC_LINK="${{ secrets.MAC_CSC_LINK }}"; fi
          if [ -n "${{ secrets.MAC_CSC_KEY_PASSWORD }}" ]; then export CSC_KEY_PASSWORD="${{ secrets.MAC_CSC_KEY_PASSWORD }}"; fi
          if [ -n "${{ secrets.APPLE_ID }}" ]; then export APPLE_ID="${{ secrets.APPLE_ID }}"; fi
          if [ -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" ]; then export APPLE_APP_SPECIFIC_PASSWORD="${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"; fi
          if [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"; fi
          pnpm exec electron-builder ${{ matrix.builder_args }} --publish never -c.extraMetadata.version=${{ steps.release_meta.outputs.version }}

      - name: Run electron-builder (Linux)
        if: matrix.platform == 'linux'
        working-directory: src/apps/desktop
        run: pnpm exec electron-builder ${{ matrix.builder_args }} --publish never -c.extraMetadata.version=${{ steps.release_meta.outputs.version }}

      - name: Run electron-builder (Windows)
        if: matrix.platform == 'win32'
        working-directory: src/apps/desktop
        run: pnpm exec electron-builder ${{ matrix.builder_args }} --publish never -c.extraMetadata.version=${{ steps.release_meta.outputs.version }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installer-${{ matrix.platform }}-${{ matrix.electron_arch }}
          path: |
            src/apps/desktop/release/*.dmg
            src/apps/desktop/release/*.zip
            src/apps/desktop/release/*.AppImage
            src/apps/desktop/release/*.deb
            src/apps/desktop/release/*.exe
            src/apps/desktop/release/*.blockmap
            src/apps/desktop/release/latest*.yml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3 – Create GitHub Release with all assets
  # ---------------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-sidecar, build-desktop]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(node -p "require('./src/apps/desktop/package.json').version")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "label=${{ inputs.release_label || 'Early Access' }}" >> "$GITHUB_OUTPUT"

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-installer-*
          path: release-assets/installers/

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Collect release files
        run: |
          mkdir -p release-files
          find release-assets/installers -type f \( \
            -name '*.dmg' -o \
            -name '*.zip' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.exe' -o \
            -name '*.blockmap' -o \
            -name 'latest*.yml' \
          \) -exec cp {} release-files/ \;
          rm -f release-files/latest-mac.yml
          python3 - <<'PY'
          from pathlib import Path

          installers_root = Path('release-assets/installers')
          release_dir = Path('release-files')
          latest_mac_sources = sorted(installers_root.glob('**/latest-mac.yml'))
          if not latest_mac_sources:
              raise SystemExit('missing latest-mac.yml in installer artifacts')

          def parse_scalar(value: str) -> str:
              value = value.split(' #', 1)[0].strip()
              if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
                  return value[1:-1]
              return value

          merged_files = []
          release_date = ''
          version = ''
          for latest_mac in latest_mac_sources:
              text = latest_mac.read_text()
              lines = text.splitlines()
              in_files = False
              current_item = None
              current_indent = None
              for raw_line in lines:
                  stripped = raw_line.strip()
                  if not stripped:
                      continue
                  if stripped == 'files:':
                      in_files = True
                      continue
                  if not in_files:
                      if stripped.startswith('version:') and not version:
                          version = parse_scalar(stripped.split(':', 1)[1])
                      elif stripped.startswith('releaseDate:') and not release_date:
                          release_date = parse_scalar(stripped.split(':', 1)[1])
                      continue
                  indent = len(raw_line) - len(raw_line.lstrip(' '))
                  if stripped.startswith('- '):
                      if current_item:
                          merged_files.append(current_item)
                      current_item = {}
                      current_indent = indent
                      body = stripped[2:].strip()
                      if body.startswith('url:'):
                          current_item['url'] = parse_scalar(body.split(':', 1)[1])
                      continue
                  if current_item is None or current_indent is None:
                      continue
                  if indent <= current_indent:
                      merged_files.append(current_item)
                      current_item = None
                      current_indent = None
                      continue
                  if ':' not in stripped:
                      continue
                  key, value = stripped.split(':', 1)
                  current_item[key.strip()] = parse_scalar(value)
              if current_item:
                  merged_files.append(current_item)

          deduped = []
          seen_urls = set()
          for item in merged_files:
              url = item.get('url', '')
              if not url or url in seen_urls:
                  continue
              seen_urls.add(url)
              deduped.append(item)

          if not deduped:
              raise SystemExit('no files found while merging latest-mac.yml assets')

          zip_entry = next((item for item in deduped if str(item.get('url', '')).endswith('.zip')), None)
          if zip_entry is None:
              raise SystemExit('merged latest-mac.yml must include a zip file')

          if not any(str(item.get('url', '')).endswith('arm64.zip') for item in deduped):
              raise SystemExit('merged latest-mac.yml must include arm64 zip')
          if not any(str(item.get('url', '')).endswith('x64.zip') for item in deduped):
              raise SystemExit('merged latest-mac.yml must include x64 zip')

          out = [f'version: {version}'] if version else []
          out.append('files:')
          for item in deduped:
              out.append(f"  - url: {item['url']}")
              if 'sha512' in item:
                  out.append(f"    sha512: {item['sha512']}")
              if 'size' in item:
                  out.append(f"    size: {item['size']}")
          out.append(f"path: {zip_entry['url']}")
          if 'sha512' in zip_entry:
              out.append(f"sha512: {zip_entry['sha512']}")
          if release_date:
              out.append(f"releaseDate: '{release_date}'")

          (release_dir / 'latest-mac.yml').write_text('\n'.join(out) + '\n')
          PY
          echo "--- Release files ---"
          ls -lh release-files/

      - name: Validate release files
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          release_dir = Path('release-files')
          mac_zip_files = sorted(path.name for path in release_dir.glob('*mac*.zip'))
          if not mac_zip_files:
              raise SystemExit('missing mac zip in release-files')

          latest_mac = release_dir / 'latest-mac.yml'
          if not latest_mac.exists():
              raise SystemExit('missing latest-mac.yml in release-files')
          if not (release_dir / 'latest.yml').exists():
              raise SystemExit('missing latest.yml in release-files')

          text = latest_mac.read_text()

          def parse_scalar(value: str) -> str:
              value = value.split(' #', 1)[0].strip()
              if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
                  return value[1:-1]
              return value

          path_match = re.search(r'(?m)^path:\s*(.+?)\s*$', text)
          yml_path = parse_scalar(path_match.group(1)) if path_match else ''

          first_file_url = ''
          lines = text.splitlines()
          for index, raw_line in enumerate(lines):
              stripped = raw_line.strip()
              if stripped != 'files:':
                  continue
              files_indent = len(raw_line) - len(raw_line.lstrip(' '))
              current_item_indent = None
              for nested_line in lines[index + 1:]:
                  nested_stripped = nested_line.strip()
                  if not nested_stripped or nested_stripped.startswith('#'):
                      continue
                  nested_indent = len(nested_line) - len(nested_line.lstrip(' '))
                  if nested_indent <= files_indent and not nested_stripped.startswith('-'):
                      break
                  if nested_stripped.startswith('- '):
                      current_item_indent = nested_indent
                      item_body = nested_stripped[2:].strip()
                      if item_body.startswith('url:'):
                          first_file_url = parse_scalar(item_body[4:])
                          break
                      continue
                  if current_item_indent is not None and nested_indent > current_item_indent and nested_stripped.startswith('url:'):
                      first_file_url = parse_scalar(nested_stripped[4:])
                      break
              break

          if not (yml_path.endswith('.zip') or first_file_url.endswith('.zip')):
              raise SystemExit(
                  f'latest-mac.yml must point to a .zip file, got path={yml_path or "<missing>"} '
                  f'files[0].url={first_file_url or "<missing>"}'
              )
          if 'Arkloop-mac-arm64.zip' not in text:
              raise SystemExit('latest-mac.yml missing arm64 zip entry')
          if 'Arkloop-mac-x64.zip' not in text:
              raise SystemExit('latest-mac.yml missing x64 zip entry')
          PY

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## 下载

          - Windows：下载 `Arkloop-win-x64.exe`
          - macOS Apple Silicon：下载 `Arkloop-mac-arm64.dmg`
          - macOS Intel：下载 `Arkloop-mac-x64.dmg`
          - Linux x64：下载 `Arkloop-linux-amd64.deb` 或 `Arkloop-linux-x86_64.AppImage`

          ## 说明
          EOF

      - name: Generate desktop manifest
        env:
          ARKLOOP_RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
          ARKLOOP_DESKTOP_MANIFEST_OUTPUT: release-files/desktop-manifest.json
          ARKLOOP_RELEASE_DIR: release-files
          ARKLOOP_OPENVIKING_IMAGE: ghcr.io/volcengine/openviking:v0.3.3
          ARKLOOP_OPENVIKING_VERSION: v0.3.3
          ARKLOOP_RELEASE_LABEL: ${{ steps.release_meta.outputs.label }}
        run: node src/apps/desktop/scripts/generate-desktop-manifest.mjs

      - name: Validate desktop manifest
        env:
          ARKLOOP_EXPECTED_VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path('release-files/desktop-manifest.json')
          if not manifest_path.exists():
              raise SystemExit('desktop-manifest.json missing')

          manifest = json.loads(manifest_path.read_text())
          expected = os.environ['ARKLOOP_EXPECTED_VERSION'].lstrip('v')

          def require(value, key):
              if not isinstance(value, str) or not value.strip():
                  raise SystemExit(f'invalid manifest field: {key}')
              return value

          version = require(manifest.get('version'), 'version')
          if version != expected:
              raise SystemExit(f'manifest version mismatch: {version} != {expected}')

          openviking = manifest.get('openviking', {})
          require(openviking.get('version'), 'openviking.version')
          require(openviking.get('image'), 'openviking.image')

          sandbox = manifest.get('sandbox') or {}
          for key in ('kernel', 'rootfs'):
              item = sandbox.get(key)
              if not item:
                  continue
              filename = require(item.get('filename'), f'sandbox.{key}.filename')
              require(item.get('version'), f'sandbox.{key}.version')
              if not Path('release-files', filename).exists():
                  raise SystemExit(f'missing manifest asset: {filename}')
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.release_meta.outputs.version }} ${{ steps.release_meta.outputs.label }}"
          body_path: release-notes.md
          generate_release_notes: true
          files: release-files/*
