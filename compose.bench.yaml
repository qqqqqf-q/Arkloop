name: arkloop-bench

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=400"]
    environment:
      POSTGRES_USER: ${ARKLOOP_POSTGRES_USER:-arkloop}
      POSTGRES_PASSWORD: ${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ARKLOOP_POSTGRES_DB:-arkloop}
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}
      --appendonly yes
    ports:
      - "6384:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  seaweedfs:
    image: chrislusf/seaweedfs:4.17
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -ec
    environment:
      AWS_ACCESS_KEY_ID: ${ARKLOOP_S3_ACCESS_KEY:-arkloop}
      AWS_SECRET_ACCESS_KEY: ${ARKLOOP_S3_SECRET_KEY:?请在 .env 中设置 ARKLOOP_S3_SECRET_KEY}
    ports:
      - "9005:8333"
    volumes:
      - seaweedfs_data:/data
    command:
      - >-
        printf '%s' '{"identities":[{"name":"arkloop","credentials":[{"accessKey":"'"$$AWS_ACCESS_KEY_ID"'","secretKey":"'"$$AWS_SECRET_ACCESS_KEY"'"}],"actions":["Admin","Read","List","Tagging","Write"]}]}' >/tmp/s3-config.json &&
        exec weed server -dir=/data -s3 -ip.bind=0.0.0.0 -s3.port=8333 -s3.config=/tmp/s3-config.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: src/services/api/Dockerfile
    entrypoint: ["migrate"]
    command: ["up"]
    environment:
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: unless-stopped
    environment:
      DB_USER: ${ARKLOOP_POSTGRES_USER:-arkloop}
      DB_PASSWORD: ${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${ARKLOOP_POSTGRES_DB:-arkloop}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "${ARKLOOP_PGBOUNCER_POOL_SIZE:-200}"
      MAX_CLIENT_CONN: "${ARKLOOP_PGBOUNCER_MAX_CLIENT_CONN:-1000}"
      SERVER_RESET_QUERY: ""
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: "${ARKLOOP_POSTGRES_USER:-arkloop}"
      STATS_USERS: "${ARKLOOP_POSTGRES_USER:-arkloop}"
    ports:
      - "5438:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${ARKLOOP_POSTGRES_USER:-arkloop}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: src/services/api/Dockerfile
    restart: unless-stopped
    environment:
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@pgbouncer:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_DATABASE_DIRECT_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/0"
      ARKLOOP_GATEWAY_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/1"
      ARKLOOP_S3_ENDPOINT: "http://seaweedfs:8333"
      ARKLOOP_S3_SECRET_KEY: "${ARKLOOP_S3_SECRET_KEY:?请在 .env 中设置 ARKLOOP_S3_SECRET_KEY}"
      ARKLOOP_S3_BUCKET: "${ARKLOOP_S3_BUCKET:-arkloop}"
      ARKLOOP_S3_REGION: "${ARKLOOP_S3_REGION:-us-east-1}"
      ARKLOOP_API_GO_ADDR: "0.0.0.0:8001"
      ARKLOOP_AUTH_JWT_SECRET: "${ARKLOOP_AUTH_JWT_SECRET:?请在 .env 中设置 ARKLOOP_AUTH_JWT_SECRET}"
      ARKLOOP_API_DB_POOL_MAX_CONNS: "64"
      ARKLOOP_API_DB_POOL_MIN_CONNS: "16"
      ARKLOOP_API_DB_POOL_STATS_INTERVAL_SECONDS: "10"
      ARKLOOP_API_MAX_IN_FLIGHT: "256"
      ARKLOOP_API_DIRECT_POOL_ACQUIRE_TIMEOUT_MS: "200"
      # 支撑 worker_runs=50 的并发上限（对应 config key: limit.concurrent_runs）
      ARKLOOP_LIMIT_CONCURRENT_RUNS: "60"
    ports:
      - "8006:8001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway:
    build:
      context: .
      dockerfile: src/services/gateway/Dockerfile
    restart: unless-stopped
    environment:
      ARKLOOP_GATEWAY_ADDR: "0.0.0.0:8000"
      ARKLOOP_GATEWAY_UPSTREAM: "http://api:8001"
      ARKLOOP_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/0"
      ARKLOOP_GATEWAY_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/1"
      ARKLOOP_AUTH_JWT_SECRET: "${ARKLOOP_AUTH_JWT_SECRET:?请在 .env 中设置 ARKLOOP_AUTH_JWT_SECRET}"
      ARKLOOP_GATEWAY_ENABLE_BENCHZ: "true"
      # 避免 429 干扰吞吐与延迟
      ARKLOOP_RATELIMIT_CAPACITY: "120000"
      ARKLOOP_RATELIMIT_RATE_PER_MINUTE: "120000"
    ports:
      - "8005:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: src/services/worker/Dockerfile
    restart: unless-stopped
    environment:
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@pgbouncer:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_DATABASE_DIRECT_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/0"
      # 避免 runs 排队导致超时，确保 "并发 run" 真并发
      ARKLOOP_WORKER_CONCURRENCY: "50"
      # Bench 基线默认不启用外部依赖（MCP / Memory / Sandbox）
      ARKLOOP_MCP_CONFIG_FILE: ""
      ARKLOOP_OPENVIKING_BASE_URL: ""
      ARKLOOP_SANDBOX_BASE_URL: ""
      # 确保无显式路由时走默认 stub
      ARKLOOP_PROVIDER_ROUTING_JSON: ""
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  seaweedfs_data:
