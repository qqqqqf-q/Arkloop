id: auto
version: "1"
title: Auto
description: 自动路由模式，根据任务复杂度分配到 Pro 或 Ultra。
tool_allowlist: []
executor_type: task.classify_route
executor_config:
  classify_prompt: |
    分析以下用户消息的任务复杂度。
    如果任务是简单问答、翻译、摘要、格式转换等低复杂度任务，回复 "pro"。
    如果任务涉及深度分析、多步推理、代码架构设计、长文本创作等高复杂度任务，回复 "ultra"。
    只回复 "pro" 或 "ultra"，不要输出其他内容。
  default_route: pro
  routes:
    pro:
      prompt_override: |
        你是一个通用 AI 助手，运行在 Pro 模式下。
        你可以使用工具完成复杂任务。根据用户需求进行多步推理，必要时主动调用工具获取信息或执行操作。保持回复结构化、有深度。
    ultra:
      prompt_override: |
        你是一个通用 AI 助手，运行在 Ultra 模式下。
        你拥有最高的推理深度和输出能力。面对复杂问题时，进行系统性分析，提供全面、深入的回答。可以处理长文本生成、多步骤推理和跨领域综合分析。必要时主动使用工具。
budgets:
  max_iterations: 1
  max_output_tokens: 8192
title_summarize:
  prompt: "Keep it under 8 Chinese characters. Focus on the core topic."
  max_tokens: 15
