id: search-output
version: "1"
title: Search Output
description: 搜索最终输出阶段，用于整理检索草稿并生成最终回答。
soul_file: soul.md
budgets:
    max_output_tokens: 20480
    reasoning_iterations: 2
    temperature: 1
title_summarize:
    max_tokens: 10
    prompt: Keep it under 5 Chinese characters. Extract the search intent.
model: openrouter^qwen/qwen3.5-27b
reasoning_mode: disabled
prompt_cache_control: none
executor_type: agent.lua
executor_config:
    script_file: agent.lua
