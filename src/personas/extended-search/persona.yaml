id: extended-search
version: "1"
title: Extended Search
description: 联网搜索模式，自动检索网络信息并综合输出。
soul_file: soul.md
user_selectable: false
selector_name: Search
selector_order: 2
budgets:
    max_output_tokens: 8192
    reasoning_iterations: 99900
    temperature: 0.7
title_summarize:
    max_tokens: 10
    prompt: Keep it under 5 Chinese characters. Extract the search intent.
reasoning_mode: auto
prompt_cache_control: none
executor_type: agent.lua
executor_config:
    script_file: agent.lua
