services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
    environment:
      POSTGRES_USER: ${ARKLOOP_POSTGRES_USER:-arkloop}
      POSTGRES_PASSWORD: ${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ARKLOOP_POSTGRES_DB:-arkloop}
    ports:
      - "${ARKLOOP_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}
      --appendonly yes
    ports:
      - "${ARKLOOP_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}", "ping"]
      interval: 30s
      timeout: 3s
      retries: 20

  redis_gateway:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}
      --appendonly no
      --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}", "ping"]
      interval: 30s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${ARKLOOP_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${ARKLOOP_S3_SECRET_KEY:?请在 .env 中设置 ARKLOOP_S3_SECRET_KEY}
    ports:
      - "${ARKLOOP_S3_API_PORT:-9000}:9000"
      - "${ARKLOOP_S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: src/services/api/Dockerfile
    entrypoint: ["migrate"]
    command: ["up"]
    env_file:
      - .env
    environment:
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: src/services/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@pgbouncer:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_DATABASE_DIRECT_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/0"
      ARKLOOP_GATEWAY_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis_gateway:6379/0"
      ARKLOOP_S3_ENDPOINT: "${ARKLOOP_S3_ENDPOINT:-http://minio:9000}"
      ARKLOOP_API_GO_ADDR: "0.0.0.0:8001"
    ports:
      - "${ARKLOOP_API_PORT:-8001}:8001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis_gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/healthz"]
      interval: 15s
      timeout: 3s
      retries: 20

  gateway:
    build:
      context: .
      dockerfile: src/services/gateway/Dockerfile
    restart: unless-stopped
    environment:
      ARKLOOP_GATEWAY_ADDR: "0.0.0.0:8000"
      ARKLOOP_GATEWAY_UPSTREAM: "${ARKLOOP_GATEWAY_UPSTREAM:-http://api:8001}"
      ARKLOOP_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/0"
      ARKLOOP_GATEWAY_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis_gateway:6379/0"
      ARKLOOP_AUTH_JWT_SECRET: "${ARKLOOP_AUTH_JWT_SECRET}"
      ARKLOOP_RATELIMIT_CAPACITY: "${ARKLOOP_RATELIMIT_CAPACITY:-600}"
      ARKLOOP_RATELIMIT_RATE_PER_MINUTE: "${ARKLOOP_RATELIMIT_RATE_PER_MINUTE:-300}"
    ports:
      - "${ARKLOOP_GATEWAY_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis_gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 3s
      retries: 20

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_USER: ${ARKLOOP_POSTGRES_USER:-arkloop}
      DB_PASSWORD: ${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${ARKLOOP_POSTGRES_DB:-arkloop}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "${ARKLOOP_PGBOUNCER_POOL_SIZE:-30}"
      MAX_CLIENT_CONN: "${ARKLOOP_PGBOUNCER_MAX_CLIENT_CONN:-1000}"
      SERVER_IDLE_TIMEOUT: "120"
      SERVER_RESET_QUERY: ""
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: "${ARKLOOP_POSTGRES_USER:-arkloop}"
      STATS_USERS: "${ARKLOOP_POSTGRES_USER:-arkloop}"
    ports:
      - "${ARKLOOP_PGBOUNCER_PORT:-5433}:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${ARKLOOP_POSTGRES_USER:-arkloop}"]
      interval: 30s
      timeout: 3s
      retries: 20

  browser:
    build:
      context: .
      dockerfile: src/services/browser/Dockerfile
    restart: unless-stopped
    environment:
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@pgbouncer:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      BROWSER_PORT: "3000"
      BROWSER_MAX_BROWSERS: "${ARKLOOP_BROWSER_MAX_BROWSERS:-2}"
      BROWSER_MAX_CONTEXTS_PER_BROWSER: "${ARKLOOP_BROWSER_MAX_CONTEXTS:-20}"
      BROWSER_CONTEXT_IDLE_TIMEOUT_S: "60"
      BROWSER_CONTEXT_MAX_LIFETIME_S: "${ARKLOOP_BROWSER_CONTEXT_MAX_LIFETIME_S:-}"
      BROWSER_MINIO_ENDPOINT: "minio:9000"
      BROWSER_MINIO_ACCESS_KEY: "${ARKLOOP_S3_ACCESS_KEY:-minioadmin}"
      BROWSER_MINIO_SECRET_KEY: "${ARKLOOP_S3_SECRET_KEY:?请在 .env 中设置 ARKLOOP_S3_SECRET_KEY}"
      BROWSER_MINIO_BUCKET_SESSIONS: "browser-sessions"
      BROWSER_MINIO_BUCKET_SCREENSHOTS: "browser-screenshots"
      BROWSER_MINIO_PUBLIC_ENDPOINT: "${BROWSER_MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}"
      BROWSER_BLOCKED_HOSTS: "postgres,redis,minio,openviking,api,worker,gateway,pgbouncer"
    ports:
      - "${ARKLOOP_BROWSER_PORT:-3100}:3000"
    depends_on:
      minio:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: src/services/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 以下覆盖 .env 中同名变量，使用 Docker 内部服务名
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@pgbouncer:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_DATABASE_DIRECT_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/0"
      ARKLOOP_WORKER_CONCURRENCY: "${ARKLOOP_WORKER_CONCURRENCY:-4}"
      # 容器内无宿主机文件系统，MCP 配置从数据库读取
      ARKLOOP_MCP_CONFIG_FILE: ""
      ARKLOOP_OPENVIKING_BASE_URL: "http://openviking:1933"
      # Browser Service：容器内用服务名寻址
      ARKLOOP_BROWSER_BASE_URL: "http://browser:3000"
      # Sandbox：容器内用服务名寻址（Firecracker 模式）；Docker 模式需在 .env 中覆盖为 host.docker.internal
      ARKLOOP_SANDBOX_BASE_URL: "${ARKLOOP_SANDBOX_BASE_URL:-}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Sandbox: Firecracker 模式 ---
  # 启用条件：ARKLOOP_SANDBOX_PROVIDER=firecracker（默认）
  # 需要 Linux 宿主 + /dev/kvm + Firecracker 二进制
  sandbox:
    build:
      context: .
      dockerfile: src/services/sandbox/Dockerfile
    restart: unless-stopped
    devices:
      - /dev/kvm:/dev/kvm
    privileged: true
    profiles:
      - firecracker
    environment:
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@pgbouncer:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_SANDBOX_ADDR: "0.0.0.0:8002"
      ARKLOOP_SANDBOX_PROVIDER: "firecracker"
      ARKLOOP_FIRECRACKER_BIN: "${ARKLOOP_FIRECRACKER_BIN:-/usr/bin/firecracker}"
      ARKLOOP_SANDBOX_KERNEL_IMAGE: "${ARKLOOP_SANDBOX_KERNEL_IMAGE:-/opt/sandbox/vmlinux}"
      ARKLOOP_SANDBOX_ROOTFS: "${ARKLOOP_SANDBOX_ROOTFS:-/opt/sandbox/rootfs.ext4}"
      ARKLOOP_SANDBOX_SOCKET_DIR: "/run/sandbox"
      ARKLOOP_SANDBOX_MAX_SESSIONS: "${ARKLOOP_SANDBOX_MAX_SESSIONS:-50}"
      ARKLOOP_S3_ENDPOINT: "${ARKLOOP_S3_ENDPOINT:-http://minio:9000}"
      ARKLOOP_S3_ACCESS_KEY: "${ARKLOOP_S3_ACCESS_KEY:-minioadmin}"
      ARKLOOP_S3_SECRET_KEY: "${ARKLOOP_S3_SECRET_KEY:-arkloop_minio}"
    volumes:
      - sandbox_sockets:/run/sandbox
      - ./config/sandbox/templates.json:/opt/sandbox/templates.json:ro
      - /usr/bin/firecracker:/usr/bin/firecracker:ro
      - /opt/sandbox/vmlinux:/opt/sandbox/vmlinux:ro
      - /opt/sandbox/rootfs:/opt/sandbox/rootfs:ro
    ports:
      - "${ARKLOOP_SANDBOX_PORT:-8002}:8002"
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Sandbox: Docker 模式 ---
  # 启用条件：ARKLOOP_SANDBOX_PROVIDER=docker
  # macOS/Windows/无 KVM 环境使用，通过 Docker socket 创建 sandbox 容器
  # 通过 internal 专用网络连接 sandbox-agent，避免接入默认网络
  sandbox-docker:
    build:
      context: .
      dockerfile: src/services/sandbox/Dockerfile
    restart: unless-stopped
    profiles:
      - docker-sandbox
    environment:
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@pgbouncer:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_SANDBOX_ADDR: "0.0.0.0:8002"
      ARKLOOP_SANDBOX_PROVIDER: "docker"
      ARKLOOP_SANDBOX_DOCKER_IMAGE: "${ARKLOOP_SANDBOX_DOCKER_IMAGE:-arkloop/sandbox-agent:latest}"
      ARKLOOP_SANDBOX_DOCKER_NETWORK: "arkloop_sandbox_agent"
      ARKLOOP_SANDBOX_SOCKET_DIR: "/run/sandbox"
      ARKLOOP_SANDBOX_MAX_SESSIONS: "${ARKLOOP_SANDBOX_MAX_SESSIONS:-50}"
      ARKLOOP_SANDBOX_TEMPLATES_PATH: ""
      ARKLOOP_S3_ENDPOINT: "${ARKLOOP_S3_ENDPOINT:-http://minio:9000}"
      ARKLOOP_S3_ACCESS_KEY: "${ARKLOOP_S3_ACCESS_KEY:-minioadmin}"
      ARKLOOP_S3_SECRET_KEY: "${ARKLOOP_S3_SECRET_KEY:-arkloop_minio}"
      DOCKER_HOST: "unix:///var/run/docker.sock"
    networks:
      - default
      - sandbox_agent
    ports:
      - "${ARKLOOP_SANDBOX_PORT:-8002}:8002"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox_sockets:/run/sandbox
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  openviking:
    image: ghcr.io/volcengine/openviking:v0.1.18.dev0
    restart: unless-stopped
    environment:
      WEB_CONCURRENCY: "${ARKLOOP_OPENVIKING_WORKERS:-4}"
    ports:
      - "${ARKLOOP_OPENVIKING_PORT:-1933}:1933"
    volumes:
      - ./config/openviking/ov.conf:/app/ov.conf:ro
      - openviking_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  openviking_data:
  sandbox_sockets:

networks:
  sandbox_agent:
    name: arkloop_sandbox_agent
    internal: true
