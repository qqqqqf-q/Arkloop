services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
    environment:
      POSTGRES_USER: ${ARKLOOP_POSTGRES_USER:-arkloop}
      POSTGRES_PASSWORD: ${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ARKLOOP_POSTGRES_DB:-arkloop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}", "ping"]
      interval: 30s
      timeout: 3s
      retries: 20

  seaweedfs:
    image: chrislusf/seaweedfs:4.17
    restart: unless-stopped
    profiles:
      - s3
    entrypoint:
      - /bin/sh
      - -ec
    environment:
      AWS_ACCESS_KEY_ID: ${ARKLOOP_S3_ACCESS_KEY:-arkloop}
      AWS_SECRET_ACCESS_KEY: ${ARKLOOP_S3_SECRET_KEY:?请在 .env 中设置 ARKLOOP_S3_SECRET_KEY}
    ports:
      - "${ARKLOOP_S3_API_PORT:-9000}:8333"
    volumes:
      - seaweedfs_data:/data
    command:
      - >-
        printf '%s' '{"identities":[{"name":"arkloop","credentials":[{"accessKey":"'"$$AWS_ACCESS_KEY_ID"'","secretKey":"'"$$AWS_SECRET_ACCESS_KEY"'"}],"actions":["Admin","Read","List","Tagging","Write"]}]}' >/tmp/s3-config.json &&
        exec weed server -dir=/data -volume.max=${ARKLOOP_S3_VOLUME_MAX:-64} -s3 -ip.bind=0.0.0.0 -s3.port=8333 -s3.config=/tmp/s3-config.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8333/healthz"]
      interval: 30s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: src/services/api/Dockerfile
    entrypoint: ["migrate"]
    command: ["up"]
    env_file:
      - .env
    environment:
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: src/services/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_DATABASE_DIRECT_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/0"
      ARKLOOP_GATEWAY_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/1"
      ARKLOOP_STORAGE_BACKEND: "${ARKLOOP_STORAGE_BACKEND:-filesystem}"
      ARKLOOP_STORAGE_ROOT: "${ARKLOOP_STORAGE_ROOT:-/var/lib/arkloop/storage}"
      ARKLOOP_S3_ENDPOINT: "${ARKLOOP_S3_ENDPOINT_DOCKER:-}"
      ARKLOOP_API_DB_POOL_MAX_CONNS: "${ARKLOOP_API_DB_POOL_MAX_CONNS:-10}"
      ARKLOOP_API_DB_POOL_MIN_CONNS: "${ARKLOOP_API_DB_POOL_MIN_CONNS:-0}"
      ARKLOOP_API_DB_POOL_STATS_INTERVAL_SECONDS: "${ARKLOOP_API_DB_POOL_STATS_INTERVAL_SECONDS:-10}"
      ARKLOOP_API_MAX_IN_FLIGHT: "${ARKLOOP_API_MAX_IN_FLIGHT:-256}"
      ARKLOOP_API_DIRECT_POOL_ACQUIRE_TIMEOUT_MS: "${ARKLOOP_API_DIRECT_POOL_ACQUIRE_TIMEOUT_MS:-200}"
      ARKLOOP_API_GO_ADDR: "0.0.0.0:8001"
      ARKLOOP_OUTBOUND_TRUST_FAKE_IP: "${ARKLOOP_OUTBOUND_TRUST_FAKE_IP:-true}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src/personas:/usr/local/share/arkloop/personas
      - arkloop_storage:${ARKLOOP_STORAGE_ROOT:-/var/lib/arkloop/storage}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/healthz"]
      interval: 15s
      timeout: 3s
      retries: 20

  gateway:
    build:
      context: .
      dockerfile: src/services/gateway/Dockerfile
    restart: unless-stopped
    environment:
      ARKLOOP_GATEWAY_ADDR: "0.0.0.0:8000"
      ARKLOOP_GATEWAY_UPSTREAM: "${ARKLOOP_GATEWAY_UPSTREAM:-http://api:8001}"
      ARKLOOP_GATEWAY_FRONTEND_UPSTREAM: "${ARKLOOP_GATEWAY_FRONTEND_UPSTREAM:-http://console-lite:80}"
      ARKLOOP_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/0"
      ARKLOOP_GATEWAY_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/1"
      ARKLOOP_AUTH_JWT_SECRET: "${ARKLOOP_AUTH_JWT_SECRET}"
      ARKLOOP_RATELIMIT_CAPACITY: "${ARKLOOP_RATELIMIT_CAPACITY:-600}"
      ARKLOOP_RATELIMIT_RATE_PER_MINUTE: "${ARKLOOP_RATELIMIT_RATE_PER_MINUTE:-300}"
    ports:
      - "${ARKLOOP_GATEWAY_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 3s
      retries: 20

  console-lite:
    build:
      context: .
      dockerfile: src/apps/console-lite/Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 15s
      timeout: 3s
      retries: 10

  console:
    build:
      context: .
      dockerfile: src/apps/console/Dockerfile
    restart: unless-stopped
    profiles:
      - console-full
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 15s
      timeout: 3s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: unless-stopped
    profiles:
      - pgbouncer
    environment:
      DB_USER: ${ARKLOOP_POSTGRES_USER:-arkloop}
      DB_PASSWORD: ${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${ARKLOOP_POSTGRES_DB:-arkloop}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "${ARKLOOP_PGBOUNCER_POOL_SIZE:-30}"
      MAX_CLIENT_CONN: "${ARKLOOP_PGBOUNCER_MAX_CLIENT_CONN:-1000}"
      SERVER_IDLE_TIMEOUT: "120"
      SERVER_RESET_QUERY: ""
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: "${ARKLOOP_POSTGRES_USER:-arkloop}"
      STATS_USERS: "${ARKLOOP_POSTGRES_USER:-arkloop}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${ARKLOOP_POSTGRES_USER:-arkloop}"]
      interval: 30s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: src/services/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_DATABASE_DIRECT_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/0"
      ARKLOOP_WORKER_CONCURRENCY: "${ARKLOOP_WORKER_CONCURRENCY:-4}"
      # 容器内无宿主机文件系统，MCP 配置从数据库读取
      ARKLOOP_MCP_CONFIG_FILE: ""
      ARKLOOP_STORAGE_BACKEND: "${ARKLOOP_STORAGE_BACKEND:-filesystem}"
      ARKLOOP_STORAGE_ROOT: "${ARKLOOP_STORAGE_ROOT:-/var/lib/arkloop/storage}"
      ARKLOOP_S3_ENDPOINT: "${ARKLOOP_S3_ENDPOINT_DOCKER:-}"
      ARKLOOP_OUTBOUND_TRUST_FAKE_IP: "${ARKLOOP_OUTBOUND_TRUST_FAKE_IP:-true}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - arkloop_storage:${ARKLOOP_STORAGE_ROOT:-/var/lib/arkloop/storage}

  # --- Sandbox: Firecracker 模式 ---
  # 启用条件：ARKLOOP_SANDBOX_PROVIDER=firecracker（默认）
  # 需要 Linux 宿主 + /dev/kvm + Firecracker 二进制
  sandbox:
    build:
      context: .
      dockerfile: src/services/sandbox/Dockerfile
    restart: unless-stopped
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    sysctls:
      net.ipv4.ip_forward: "1"
    profiles:
      - firecracker
    environment:
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_SANDBOX_ADDR: "0.0.0.0:8002"
      ARKLOOP_SANDBOX_PROVIDER: "firecracker"
      ARKLOOP_SANDBOX_ALLOW_EGRESS: "${ARKLOOP_SANDBOX_ALLOW_EGRESS:-true}"
      ARKLOOP_FIRECRACKER_BIN: "${ARKLOOP_FIRECRACKER_BIN:-/usr/bin/firecracker}"
      ARKLOOP_SANDBOX_KERNEL_IMAGE: "${ARKLOOP_SANDBOX_KERNEL_IMAGE:-/opt/sandbox/vmlinux}"
      ARKLOOP_SANDBOX_ROOTFS: "${ARKLOOP_SANDBOX_ROOTFS:-/opt/sandbox/rootfs.ext4}"
      ARKLOOP_SANDBOX_SOCKET_DIR: "/run/sandbox"
      ARKLOOP_SANDBOX_EGRESS_INTERFACE: "${ARKLOOP_SANDBOX_EGRESS_INTERFACE:-eth0}"
      ARKLOOP_SANDBOX_FIRECRACKER_TAP_PREFIX: "${ARKLOOP_SANDBOX_FIRECRACKER_TAP_PREFIX:-arktap}"
      ARKLOOP_SANDBOX_FIRECRACKER_TAP_CIDR: "${ARKLOOP_SANDBOX_FIRECRACKER_TAP_CIDR:-172.29.0.0/16}"
      ARKLOOP_SANDBOX_FIRECRACKER_DNS: "${ARKLOOP_SANDBOX_FIRECRACKER_DNS:-1.1.1.1,8.8.8.8}"
      ARKLOOP_SANDBOX_MAX_SESSIONS: "${ARKLOOP_SANDBOX_MAX_SESSIONS:-50}"
      ARKLOOP_STORAGE_BACKEND: "${ARKLOOP_STORAGE_BACKEND:-filesystem}"
      ARKLOOP_STORAGE_ROOT: "${ARKLOOP_STORAGE_ROOT:-/var/lib/arkloop/storage}"
      ARKLOOP_S3_ENDPOINT: "${ARKLOOP_S3_ENDPOINT_DOCKER:-}"
      ARKLOOP_S3_ACCESS_KEY: "${ARKLOOP_S3_ACCESS_KEY:-}"
      ARKLOOP_S3_SECRET_KEY: "${ARKLOOP_S3_SECRET_KEY:-}"
    volumes:
      - sandbox_sockets:/run/sandbox
      - arkloop_storage:${ARKLOOP_STORAGE_ROOT:-/var/lib/arkloop/storage}
      - ./config/sandbox/templates.json:/opt/sandbox/templates.json:ro
      - /usr/bin/firecracker:/usr/bin/firecracker:ro
      - /opt/sandbox/vmlinux:/opt/sandbox/vmlinux:ro
      - /opt/sandbox/rootfs:/opt/sandbox/rootfs:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Sandbox: Docker 模式 ---
  # 启用条件：ARKLOOP_SANDBOX_PROVIDER=docker
  # macOS/Windows/无 KVM 环境使用，通过用户态 Docker socket 创建 sandbox 容器
  # 通过专用网络连接 sandbox-agent，默认允许外网访问以支持 git clone / curl 等开发任务
  sandbox-agent-image:
    build:
      context: .
      dockerfile: src/services/sandbox/Dockerfile.agent
    image: ${ARKLOOP_SANDBOX_DOCKER_IMAGE:-arkloop/sandbox-agent:dev}
    restart: "no"
    profiles:
      - docker-sandbox
    entrypoint: ["/bin/sh", "-lc", "true"]

  sandbox-browser-image:
    build:
      context: .
      dockerfile: src/services/sandbox/Dockerfile.browser
    image: ${ARKLOOP_SANDBOX_BROWSER_DOCKER_IMAGE:-arkloop/sandbox-browser:dev}
    restart: "no"
    profiles:
      - docker-sandbox
    entrypoint: ["/bin/sh", "-lc", "true"]

  sandbox-docker:
    build:
      context: .
      dockerfile: src/services/sandbox/Dockerfile
    restart: unless-stopped
    profiles:
      - docker-sandbox
    environment:
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_SANDBOX_ADDR: "0.0.0.0:8002"
      ARKLOOP_SANDBOX_PROVIDER: "docker"
      ARKLOOP_SANDBOX_ALLOW_EGRESS: "${ARKLOOP_SANDBOX_ALLOW_EGRESS:-true}"
      ARKLOOP_SANDBOX_DOCKER_IMAGE: "${ARKLOOP_SANDBOX_DOCKER_IMAGE:-arkloop/sandbox-agent:dev}"
      ARKLOOP_SANDBOX_BROWSER_DOCKER_IMAGE: "${ARKLOOP_SANDBOX_BROWSER_DOCKER_IMAGE:-arkloop/sandbox-browser:dev}"
      ARKLOOP_SANDBOX_DOCKER_NETWORK: "arkloop_sandbox_agent_egress"
      ARKLOOP_SANDBOX_SOCKET_DIR: "/run/sandbox"
      ARKLOOP_SANDBOX_MAX_SESSIONS: "${ARKLOOP_SANDBOX_MAX_SESSIONS:-50}"
      ARKLOOP_SANDBOX_TEMPLATES_PATH: ""
      ARKLOOP_STORAGE_BACKEND: "${ARKLOOP_STORAGE_BACKEND:-filesystem}"
      ARKLOOP_STORAGE_ROOT: "${ARKLOOP_STORAGE_ROOT:-/var/lib/arkloop/storage}"
      ARKLOOP_S3_ENDPOINT: "${ARKLOOP_S3_ENDPOINT_DOCKER:-}"
      ARKLOOP_S3_ACCESS_KEY: "${ARKLOOP_S3_ACCESS_KEY:-}"
      ARKLOOP_S3_SECRET_KEY: "${ARKLOOP_S3_SECRET_KEY:-}"
      DOCKER_HOST: "unix:///run/docker-host.sock"
    networks:
      - default
      - sandbox_agent_egress
      - sandbox_agent_internal
    volumes:
      - type: bind
        source: ${ARKLOOP_SANDBOX_DOCKER_SOCKET_PATH:-/tmp/arkloop-docker.sock}
        target: /run/docker-host.sock
        read_only: true
        bind:
          create_host_path: false
      - sandbox_sockets:/run/sandbox
      - arkloop_storage:${ARKLOOP_STORAGE_ROOT:-/var/lib/arkloop/storage}
    depends_on:
      sandbox-agent-image:
        condition: service_completed_successfully
      sandbox-browser-image:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  openviking:
    # pre-release: upstream 暂无稳定版，跟踪 https://github.com/volcengine/openviking/releases
    image: ghcr.io/volcengine/openviking:v0.1.18.dev0
    restart: unless-stopped
    profiles:
      - openviking
    environment:
      WEB_CONCURRENCY: "${ARKLOOP_OPENVIKING_WORKERS:-1}"
    volumes:
      - ./config/openviking/ov.conf:/app/ov.conf:ro
      - openviking_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- SearXNG: Self-hosted metasearch engine ---
  # web_search provider, replaces Tavily API
  searxng:
    image: searxng/searxng:2025.9.29-77fd3ee53
    restart: unless-stopped
    profiles:
      - searxng
    volumes:
      - searxng_data:/etc/searxng
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 15s

  # --- Firecrawl: Self-hosted web scraper ---
  # web_fetch provider, replaces Jina/Basic fetch
  firecrawl:
    # upstream 不提供版本标签 (https://github.com/firecrawl/firecrawl/issues/1750)
    image: mendableai/firecrawl:latest
    restart: unless-stopped
    profiles:
      - firecrawl
    environment:
      REDIS_URL: "redis://firecrawl-redis:6379"
      REDIS_RATE_LIMIT_URL: "redis://firecrawl-redis:6379"
      USE_DB_AUTHENTICATION: "false"
      PORT: "3002"
      HOST: "0.0.0.0"
      NUM_WORKERS_PER_QUEUE: "${ARKLOOP_FIRECRAWL_WORKERS:-4}"
      PLAYWRIGHT_MICROSERVICE_URL: "http://firecrawl-playwright:3000/chromium"
    depends_on:
      firecrawl-redis:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3002/"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  firecrawl-playwright:
    image: ghcr.io/browserless/chromium:v2.42.0
    restart: unless-stopped
    profiles:
      - firecrawl
    environment:
      MAX_CONCURRENT_SESSIONS: "${ARKLOOP_FIRECRAWL_MAX_BROWSER_SESSIONS:-5}"
      CONNECTION_TIMEOUT: "60000"

  firecrawl-redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles:
      - firecrawl
    command: >
      redis-server
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  seaweedfs_data:
  openviking_data:
  sandbox_sockets:
  arkloop_storage:
  searxng_data:

networks:
  sandbox_agent_egress:
    name: arkloop_sandbox_agent_egress
  sandbox_agent_internal:
    name: arkloop_sandbox_agent_internal
    internal: true
