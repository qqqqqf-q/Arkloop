services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ARKLOOP_POSTGRES_USER:-arkloop}
      POSTGRES_PASSWORD: ${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ARKLOOP_POSTGRES_DB:-arkloop}
    ports:
      - "${ARKLOOP_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}
      --appendonly yes
    ports:
      - "${ARKLOOP_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${ARKLOOP_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${ARKLOOP_S3_SECRET_KEY:?请在 .env 中设置 ARKLOOP_S3_SECRET_KEY}
    ports:
      - "${ARKLOOP_S3_API_PORT:-9000}:9000"
      - "${ARKLOOP_S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway:
    build:
      context: .
      dockerfile: src/services/gateway/Dockerfile
    restart: unless-stopped
    environment:
      ARKLOOP_GATEWAY_ADDR: "0.0.0.0:8000"
      ARKLOOP_GATEWAY_UPSTREAM: "${ARKLOOP_GATEWAY_UPSTREAM:-http://host.docker.internal:8001}"
      ARKLOOP_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/0"
      ARKLOOP_AUTH_JWT_SECRET: "${ARKLOOP_AUTH_JWT_SECRET}"
      ARKLOOP_RATELIMIT_CAPACITY: "${ARKLOOP_RATELIMIT_CAPACITY:-60}"
      ARKLOOP_RATELIMIT_RATE_PER_MINUTE: "${ARKLOOP_RATELIMIT_RATE_PER_MINUTE:-60}"
    ports:
      - "${ARKLOOP_GATEWAY_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_USER: ${ARKLOOP_POSTGRES_USER:-arkloop}
      DB_PASSWORD: ${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${ARKLOOP_POSTGRES_DB:-arkloop}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "${ARKLOOP_PGBOUNCER_POOL_SIZE:-200}"
      MAX_CLIENT_CONN: "${ARKLOOP_PGBOUNCER_MAX_CLIENT_CONN:-1000}"
      SERVER_RESET_QUERY: ""
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: "${ARKLOOP_POSTGRES_USER:-arkloop}"
      STATS_USERS: "${ARKLOOP_POSTGRES_USER:-arkloop}"
    ports:
      - "${ARKLOOP_PGBOUNCER_PORT:-5433}:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${ARKLOOP_POSTGRES_USER:-arkloop}"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: src/services/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 以下覆盖 .env 中同名变量，使用 Docker 内部服务名
      ARKLOOP_DATABASE_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@pgbouncer:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_DATABASE_DIRECT_URL: "postgresql://${ARKLOOP_POSTGRES_USER:-arkloop}:${ARKLOOP_POSTGRES_PASSWORD:?请在 .env 中设置 ARKLOOP_POSTGRES_PASSWORD}@postgres:5432/${ARKLOOP_POSTGRES_DB:-arkloop}"
      ARKLOOP_REDIS_URL: "redis://:${ARKLOOP_REDIS_PASSWORD:-arkloop_redis}@redis:6379/0"
      ARKLOOP_WORKER_QUEUE_JOB_TYPES: "${ARKLOOP_WORKER_QUEUE_JOB_TYPES:-run.execute}"
      ARKLOOP_WORKER_CONCURRENCY: "${ARKLOOP_WORKER_CONCURRENCY:-4}"
      # 容器内无宿主机文件系统，MCP 配置从数据库读取
      ARKLOOP_MCP_CONFIG_FILE: ""
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
